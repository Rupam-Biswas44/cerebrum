# ============================================================
# Cerebrum — Full Stack Docker Compose
# ============================================================
# Usage:
#   Start:  docker compose -f docker/docker-compose.yml up -d
#   Stop:   docker compose -f docker/docker-compose.yml down
#   Logs:   docker compose -f docker/docker-compose.yml logs -f
# ============================================================

name: cerebrum

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-restart-policy: &restart-policy
  restart: unless-stopped

x-healthcheck-defaults: &healthcheck-defaults
  interval: 30s
  timeout: 10s
  retries: 5
  start_period: 30s

services:
  # ============================================================
  # Reverse Proxy
  # ============================================================
  traefik:
    image: traefik:v3.1
    container_name: cerebrum-traefik
    <<: *restart-policy
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--metrics.prometheus=true"
      - "--metrics.prometheus.addEntryPointsLabels=true"
      - "--metrics.prometheus.addServicesLabels=true"
      - "--accesslog=true"
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"  # Traefik dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./configs/traefik:/etc/traefik
    networks:
      - cerebrum-net
    logging: *default-logging

  # ============================================================
  # Databases
  # ============================================================
  postgres:
    image: postgres:16-alpine
    container_name: cerebrum-postgres
    <<: *restart-policy
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cerebrum}
      POSTGRES_USER: ${POSTGRES_USER:-cerebrum}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./configs/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cerebrum} -d ${POSTGRES_DB:-cerebrum}"]
      <<: *healthcheck-defaults
    networks:
      - cerebrum-net
    logging: *default-logging

  redis:
    image: redis:7-alpine
    container_name: cerebrum-redis
    <<: *restart-policy
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD required}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      <<: *healthcheck-defaults
    networks:
      - cerebrum-net
    logging: *default-logging

  # ============================================================
  # Object Storage
  # ============================================================
  minio:
    image: minio/minio:latest
    container_name: cerebrum-minio
    <<: *restart-policy
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY required}
    ports:
      - "9000:9000"
      - "9001:9001"  # MinIO Console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      <<: *healthcheck-defaults
    networks:
      - cerebrum-net
    logging: *default-logging

  # ============================================================
  # Vector Database
  # ============================================================
  qdrant:
    image: qdrant/qdrant:latest
    container_name: cerebrum-qdrant
    <<: *restart-policy
    ports:
      - "6333:6333"
      - "6334:6334"  # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
      - ./configs/qdrant/config.yaml:/qdrant/config/production.yaml:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:6333/healthz || exit 1"]
      <<: *healthcheck-defaults
    networks:
      - cerebrum-net
    logging: *default-logging

  # ============================================================
  # Graph Database
  # ============================================================
  neo4j:
    image: neo4j:5.22-community
    container_name: cerebrum-neo4j
    <<: *restart-policy
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:?NEO4J_PASSWORD required}
      NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*,gds.*"
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 2G
    ports:
      - "7474:7474"  # HTTP browser
      - "7687:7687"  # Bolt protocol
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_plugins:/plugins
    healthcheck:
      test: ["CMD-SHELL", "wget -O /dev/null -q http://localhost:7474 || exit 1"]
      <<: *healthcheck-defaults
    networks:
      - cerebrum-net
    logging: *default-logging

  # ============================================================
  # ML Experiment Tracking
  # ============================================================
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.14.3
    container_name: cerebrum-mlflow
    <<: *restart-policy
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri postgresql://${POSTGRES_USER:-cerebrum}:${POSTGRES_PASSWORD}@postgres:5432/mlflow
      --default-artifact-root s3://${MINIO_BUCKET_MODELS:-cerebrum-models}/mlflow
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ACCESS_KEY:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_SECRET_KEY}
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/health || exit 1"]
      <<: *healthcheck-defaults
    networks:
      - cerebrum-net
    logging: *default-logging

  # ============================================================
  # API Backend
  # ============================================================
  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
      target: production
    image: ghcr.io/yourusername/cerebrum-api:${APP_VERSION:-latest}
    container_name: cerebrum-api
    <<: *restart-policy
    environment:
      APP_ENV: ${APP_ENV:-production}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-cerebrum}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-cerebrum}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      MINIO_HOST: minio
      QDRANT_HOST: qdrant
      NEO4J_URI: bolt://neo4j:7687
    env_file:
      - ../.env
    ports:
      - "8000:8000"
    volumes:
      - api_logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      <<: *healthcheck-defaults
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`api.localhost`)"
      - "traefik.http.services.api.loadbalancer.server.port=8000"
    networks:
      - cerebrum-net
    logging: *default-logging

  # ============================================================
  # Celery Workers
  # ============================================================
  worker:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
      target: production
    image: ghcr.io/yourusername/cerebrum-api:${APP_VERSION:-latest}
    container_name: cerebrum-worker
    <<: *restart-policy
    command: celery -A cerebrum.worker worker --loglevel=info --concurrency=4 -Q default,agents,ml
    environment:
      APP_ENV: ${APP_ENV:-production}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-cerebrum}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-cerebrum}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
    env_file:
      - ../.env
    depends_on:
      - api
      - redis
    networks:
      - cerebrum-net
    logging: *default-logging

  celery-beat:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
      target: production
    image: ghcr.io/yourusername/cerebrum-api:${APP_VERSION:-latest}
    container_name: cerebrum-beat
    <<: *restart-policy
    command: celery -A cerebrum.worker beat --loglevel=info --scheduler redbeat.RedBeatScheduler
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-cerebrum}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-cerebrum}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
    env_file:
      - ../.env
    depends_on:
      - worker
    networks:
      - cerebrum-net
    logging: *default-logging

  # ============================================================
  # Frontend
  # ============================================================
  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:8000}
    image: ghcr.io/yourusername/cerebrum-web:${APP_VERSION:-latest}
    container_name: cerebrum-web
    <<: *restart-policy
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.web.rule=Host(`localhost`)"
      - "traefik.http.services.web.loadbalancer.server.port=3000"
    networks:
      - cerebrum-net
    logging: *default-logging

  # ============================================================
  # Observability
  # ============================================================
  prometheus:
    image: prom/prometheus:v2.53.1
    container_name: cerebrum-prometheus
    <<: *restart-policy
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    volumes:
      - ./configs/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./configs/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    networks:
      - cerebrum-net
    logging: *default-logging

  grafana:
    image: grafana/grafana:11.1.0
    container_name: cerebrum-grafana
    <<: *restart-policy
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_FEATURE_TOGGLES_ENABLE: "traceqlEditor"
      GF_SERVER_ROOT_URL: http://localhost:3001
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./configs/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./configs/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - cerebrum-net
    logging: *default-logging

  loki:
    image: grafana/loki:3.1.0
    container_name: cerebrum-loki
    <<: *restart-policy
    command: -config.file=/etc/loki/config.yml
    ports:
      - "3100:3100"
    volumes:
      - ./configs/loki/config.yml:/etc/loki/config.yml:ro
      - loki_data:/loki
    networks:
      - cerebrum-net
    logging: *default-logging

  promtail:
    image: grafana/promtail:3.1.0
    container_name: cerebrum-promtail
    <<: *restart-policy
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./configs/promtail/config.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
    networks:
      - cerebrum-net
    logging: *default-logging

  tempo:
    image: grafana/tempo:2.5.0
    container_name: cerebrum-tempo
    <<: *restart-policy
    command: -config.file=/etc/tempo/config.yml
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "3200:3200"   # Tempo HTTP
    volumes:
      - ./configs/tempo/config.yml:/etc/tempo/config.yml:ro
      - tempo_data:/var/tempo
    networks:
      - cerebrum-net
    logging: *default-logging

# ============================================================
# Networks
# ============================================================
networks:
  cerebrum-net:
    name: cerebrum-net
    driver: bridge

# ============================================================
# Volumes
# ============================================================
volumes:
  postgres_data:
    name: cerebrum-postgres-data
  redis_data:
    name: cerebrum-redis-data
  minio_data:
    name: cerebrum-minio-data
  qdrant_data:
    name: cerebrum-qdrant-data
  neo4j_data:
    name: cerebrum-neo4j-data
  neo4j_logs:
    name: cerebrum-neo4j-logs
  neo4j_plugins:
    name: cerebrum-neo4j-plugins
  prometheus_data:
    name: cerebrum-prometheus-data
  grafana_data:
    name: cerebrum-grafana-data
  loki_data:
    name: cerebrum-loki-data
  tempo_data:
    name: cerebrum-tempo-data
  api_logs:
    name: cerebrum-api-logs
