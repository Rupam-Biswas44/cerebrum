global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: cerebrum
    environment: development

rule_files:
  - alerts.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: [localhost:9090]

  - job_name: cerebrum-api
    scrape_interval: 10s
    static_configs:
      - targets: [api:8000]
    metrics_path: /metrics

  - job_name: cerebrum-worker
    static_configs:
      - targets: [worker:8001]

  - job_name: postgres
    static_configs:
      - targets: [postgres-exporter:9187]

  - job_name: redis
    static_configs:
      - targets: [redis-exporter:9121]

  - job_name: traefik
    static_configs:
      - targets: [traefik:8080]
    metrics_path: /metrics

  - job_name: node
    static_configs:
      - targets: [node-exporter:9100]
