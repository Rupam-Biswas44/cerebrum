repos:
  # ── Python: Ruff (linter + formatter) ───────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.10
    hooks:
      - id: ruff
        name: "ruff — lint"
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format
        name: "ruff — format"

  # ── Python: MyPy (type checking) ─────────────────────────────────────────
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        name: "mypy — type check"
        additional_dependencies:
          - pydantic>=2.8.0
          - sqlalchemy>=2.0.35
          - fastapi>=0.115.0
        args: [--ignore-missing-imports, --no-error-summary]

  # ── General ───────────────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=10240]  # 10MB max
      - id: detect-private-key
      - id: check-case-conflict
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: no-commit-to-branch
        args: [--branch, main]

  # ── Security ──────────────────────────────────────────────────────────────
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks
        name: "gitleaks — secret detection"

  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.9
    hooks:
      - id: bandit
        name: "bandit — security lint"
        args: [-ll, -r, apps/api, agents, services, core]
        exclude: tests/

  # ── Docker ────────────────────────────────────────────────────────────────
  - repo: https://github.com/hadolint/hadolint
    rev: v2.12.0
    hooks:
      - id: hadolint-docker
        name: "hadolint — Dockerfile lint"

  # ── YAML / JSON ───────────────────────────────────────────────────────────
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        name: "yamllint — YAML lint"
        args: [-c, .yamllint.yml]

  # ── Conventional Commits ──────────────────────────────────────────────────
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.3.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: [feat, fix, docs, style, refactor, perf, test, chore, ci, build, revert]

default_language_version:
  python: python3.13

ci:
  autofix_commit_msg: "chore: pre-commit autofix"
  autoupdate_commit_msg: "chore: pre-commit autoupdate"
  autoupdate_schedule: weekly
